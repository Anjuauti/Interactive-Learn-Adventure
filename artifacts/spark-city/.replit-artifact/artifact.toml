kind = "web"
previewPath = "/"
title = "Spark City Adventure"
version = "1.0.0"
id = "artifacts/spark-city"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21735
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/spark-city run dev"

[services.env]
PORT = "21735"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/spark-city", "run", "build"]
publicDir = "artifacts/spark-city/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
